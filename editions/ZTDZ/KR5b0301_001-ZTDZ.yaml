front:
  text: 仙苑編珠卷上大道自然混沌之先
  hash: sha256:f6f065b4119688467af3b064d3e060f51797ec29c1bb9c4b513182cd2eeadd3e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0301_SJB_001-110021b, image: sjb/11/110021b.png}
body:
  text: 道經云有物混成先天地生寂兮寥兮獨立不改周行不殆可以爲天下母吾不知其名字之曰道莊子云夫道有情有信無爲無形神鬼神帝生天生地在太極之先而不爲髙在六極之下而不爲深先天地生而不爲久長於上古而不爲老一氣凝化盤古生焉元始上眞記云昔二儀未分溟涬濛澒日月未具狀如雞子混沌玄黃乃有盤古眞人天地之精自號元始天王遊乎其中天形如巨蓋上無所係下無所根玄玄太虚無響無聲元炁浩浩如水之形若無此炁天地不生天地旣分相去三萬六千里元始天王在天脊膂中住名曰玉京山山中有宫殿竝金玉常呼吸天炁俯飲地泉忽生太玄玉女在石間出能言人形具足天姿絶妙號曰太元聖母元始君下遊見之乃招還上宫天皇東立王母西旋自元始天王太元聖母還上宫之後經一劫乃生天皇氏治世三萬六千年受書爲扶桑大帝居東極扶桑宫爲東王公今世間皇太子居東宫象此也又生九光玄女號曰太眞西王母居西極崑崙山故曰木公金母天地之尊神也伏羲八卦軒后五篇莊子云伏羲得道以襲氣母書云伏羲治世感神龜負圖而出乃畫八卦造書契得道爲東方青帝莊子云黃帝得道以登雲天經云軒轅黃帝登峨嵋山遇天眞皇人授以靈寳五符治世三百年乃鑄鼎荆山鍊丹丹成有黃龍下迎羣臣同昇者七十二人以符藏於苑委山顓頊元輦帝嚳龍軿道學傳云顓頊髙陽氏乗結元之輦北廵幽陵南廵交阯西廵游沙東廵蟠木山水之神動植之類日月所照莫不屬焉周旋八卦諸有洞臺之山隂宫之丘帝召四海神使運安息國天市山寳玉封而鎮之鑄羽山銅爲寳鼎各獻一所於有洞之山莊子云顓頊得道以處玄宫帝嚳髙卒氏感九天眞王三天眞皇乗九龍雲輿降牧德之臺授以靈寳五符帝用之得道後封此符於鍾山虞舜得藥夏禹道川眞誥云虞舜感北戎長胡大王獻白銀之霜十轉紫華服之而成仙吳越春秋云禹平洪水其功不就乃按黃帝中經聖人所記在乎九山東南號曰苑委承以文玉覆以盤石其書金簡青玉爲字編以白銀禹乃南廵登衡山血白馬以祭不幸所求乃仰天而歎因夢赤繡衣男子云欲得我治水之方御龍之術可齋乎黃帝之嶽峻巖之下金簡之書在矣禹乃退齋季庚之日登苑委之山發石果得金簡玉書用以治水鑿龍門通百川天下有賴其功大矣今道門靈寳五符即此書也其探符處在會稽山禹穴是也老君無極籛祖長年孔子曰竊比於我老彭葛仙公云老子體自然而然生乎太無之先起乎無因經歷天地终始不可稱載終乎無終窮乎無窮極乎無極也又云世人謂老子當始於周代老子之號始於無數之劫其杳杳冥冥渺邈久逺矣莊子䟽云彭祖姓篯諱鏗顓頊玄孫善養性能調鼎進雉羮於尭封於彭城其道可祖故謂之彭祖神仙傳列仙傳並云歷夏經殷七百六十歳而不衰老後西之游沙莫知其終也故羅隱碑文云水運降靈始分輝於玄帝仙源啓祚乃襲慶淤彭墟星辰浮濮渚之陽雲鸐度游沙之境也廣成髙卧君喜精研莊子云黃帝詣崆峒山謁廣成子問以理身奈何廣成子曰善哉問乎吾語汝至道之精杳杳冥冥至道之極昬昬黙黙無視無聽神將自正無勞汝形無揺汝精乃可長生故我修之千二百歳矣而形未嘗衰本起傳并西昇經並云關令尹喜受老子道德五千言精研萬遍於蜀郡青羊肆隨老子白日昇天遊四海登三清下化八十一國焉盧敖遊海若士沖天神仙傳云盧敖者燕人也秦時遊北海至于蒙谷之山見若士焉方迎風而舞顧見敖曰吾與汗漫期於九陔之上不可久乃竦身入雲中赤松行雨寗封随煙列仙傳云赤松子者神農雨師也服水玉以教神農能入火隨風雨上下髙辛時復爲雨師今之雨師復是焉寗封子者爲黃帝陶正有人能出五色煙以教封封乃積火自焼隨煙上下焉黃山數百白石三千神仙傳云黄山君者修彭祖之術年數百歳猶有少容也白石先生者中黃大夫弟子也至彭祖時年已三千歳矣嘗於白石山煑白石爲粮故號白石先生瑶水周穆槐山偓佺列子云周穆王乗八駿日行萬里至于崑崙之山與王母宴於瑶池王母唱白雲之謡王和之也列仙傳云偓佺者槐山采藥人也好食松實形體生毛長數寸兩目正方能飛行逐走馬醫龍師皇釣魚㓂先列仙傳云馬師皇者黃帝馬醫也有龍下向之張口皇曰此龍有疾乃針其脣下以甘草湯飲之而愈後數數有龍出陂告而治之一旦乗龍而去㓂先者宋人也以釣魚爲業得魚或賣或放或自食好種薜荔食其葩實宋景公問其術不告遂殺之數年後踞宋城門鼓琴而去弄玉鳴鳯蕭史同仙列仙傳云䔥史者秦穆公時善吹簫能致孔雀白鸐穆公有女曰弄玉好之公遂妻焉教弄玉作鳯鳴鳯止其臺上一旦乗鳯同去李文黃白沈太紅泉神仙傳云沈文太者九嶷人也得紅泉神丹去土符還年返命之道欲之崑崙駐安心二千餘年以傳於李文淵以竹根汁煑黃丹并黃白術去三尸法出此二人矣宋倫遊空葛洪兀然樓觀傳云宋倫字德玄年二十二日誦五千文服黃精白术感老君降授中景之道通眞之經倫行之望巖申歩日行三千里凌波陟險不由津路也道學傳云葛洪字稚川讀書萬卷求勾漏令意在丹砂著内外篇凡一百一十六篇碑誄詩賊百卷檄章牋表三十卷神仙傳十卷良吏傳十卷隠逸傳十卷集異傳十卷抄五經史百家之吉方伎雜事三百一十卷金匱藥方百卷肘後要方四卷年八十一兀然若睡而蛻鄭逺飬虎涓子剖鮮鄭思逺葛洪之師嘗甞於山巖間收得虎子兩頭其母已死君餧飼之長大俄有一雄虎來菴前乃二虎之父也三虎出入相隨駝藥嚢經書隱於括蒼山仙去列仙傳云涓子齊人餌术三百年釣於荷澤得鯉魚剖之腹内得符能致雲雨少翁拜山宋萊掃市眞誥云昔婁少翕入華山中拜山二十年遂一旦見西嶽仙人授以仙道也楚莊公時市長宋萊子恒洒掃一市忽遇一乞食公唱歌萊子知是仙人乃随之積十三年遂得仙道爲中嶽仙人永伯七星王遥篋子神仙傳云陳永伯得七星散方服之二十八日忽不知所在有兒年十一服之二十八日亦不知所在本方云服之三十日自得仙去王遥字伯遼與人治病無不愈者並不用針藥但令坐一布帕上須臾自愈有一竹篋子長數寸有一弟子姓錢忽一夜大雨命弟子以九節竹杖擔此篋子雨中行衣不濕登山入一石室中中有二人同坐遥發篋子取玉舌簧三枚三人對鼓之良久收簧内篋中却擔迴二人謂遥曰早來莫久戀人間後百餘日遥復自擔篋子一去不復還後三十年弟子見在馬蹄山也介君竹杖左慈木履神仙傳介象字元則會稽人甚有道術吳太帝禮重之使作變化種瓜果皆立生可食帝思鯔魚鱠象於殿庭作一方坎著水象垂釣於坎中得魚帝曰蜀薑不可得象曰請差人買與五百錢象書符置竹杖中令使人騎之閉目唯聞風聲到蜀買薑迴廚人切鱠未了左慈字元放有道術孫策欲殺之驅於前慈著木履竹杖徐徐而行孫公奔馬追之常相去百歩後曹公殺之唯見一束草也老父光白剡都氣紫神仙傳漢武帝東廵見泰山下老父頭上有白光髙數尺帝問之老父曰臣年八十五時衰老有道士教絶榖服术飲水并作神枕用藥三十二味臣今年一百八十矣日行三百里剡子都漢武帝出遊見其頭上有紫氣髙丈餘問之對曰臣今已年一百三十八所行者彭祖之道也帝傳之不能行子都年二百餘歲服术白日昇天河上傳經漢文得旨葛仙公云河上公者莫知其姓名也漢孝文皇帝時結草爲菴于河之濵常讀老子道德經文帝好老子之言有所不解數句遣使問不告帝親詣問之普天之下莫非王土率土之賔莫非王臣子雖有道由朕民不能自屈何乃髙乎朕足使人富貴貧賤須臾河上公乃拊掌坐躍冉冉在虚空之中去地数十丈而答帝曰余上不至天中不累人下不居地何民之有陛下焉能令余富貴貧賤帝乃稽首禮謝河上公遂授注解道德經二卷與文帝婁政變化墨子朱英神仙傳婁政治墨子五行記服朱英丸年八百餘歳色如童子能化一人爲百人百人爲千千人作萬能立起風雲歩行水上令水中魚鼈盡上岸能口吐五色氣方十里上連天能騰身虚空無所不至墨子名翟宋大夫也著書曰墨子善戰守之且巧與公輸班較機變以雲梯不足攻宋面止後入狄山中學道有神仙授以翟朱英丸方通靈五行變化凡二十五卷因遊吾獄不知其終也孫博同道班孟異名神仙傳孫博治墨子五行術能令草木金石人物盡成猛火他人以水沃之終不滅須博自止之乃滅物皆如故不焦又能引數百衆歩行水上不沾不沒或布席坐於木上飲宴作樂又能從石中來去後入林慮山合丹仙去班孟者是女子能飛行坐空入地飛屋瓦指地成井能含墨噴紙成篇章飮酒餌丹四百餘歳後入天台山去也王綱二氣章震五行神仙傳天門子姓王名綱善補養之法行玄素之道年一百八十歳有童女之色乃服珠醴仙去入玄洲章震者王子也師桑子精於五行之意以養性治病消災立起風雲雷兩化草芥瓦石爲六畜龍虎能分形爲數百千人歩行江海能噴水成珠玉不變能丸泥爲馬日行千里能吐五色氣能投符召魚鼈能使人見千里外物能呪水治病立愈入崆峒山合丹白日昇天九靈却禍北極貴精神仙傳九靈子姓皇名化得還年却老胎息之道又得五行之要能辟五兵虎狼伏千殃消萬禍専行此道大得其効在人間五百歲服丹仙去北極子姓隂名恒得保神飬性貴精之道其要曰以金治金謂之眞以人治人謂之神後服神丹仙去太陽華髮絶洞長生神仙傳太陽子者姓離名明得玉子之道好酒恒醉玉子責之對曰晩學性剛俗態未除故以酒消其驕慢耳善修五行之道在人間五百年肌膚光潤面目輝華而鬢髮皓白也著七寳之術深得其要服丹而仙絶洞子者姓李名脩其術曰弱能制强隂能弊陽常若臨深履薄長生之道也年四百歳顔色不衰著書三十篇服還丹而仙陽女得妙隂女亦成神仙傳太陽女姓朱名翼増益五行之道其験得妙年二百八十歳色如桃花如十七八人也得神丹仙去太隂女者姓盧名金好玉子之道未得其妙乃當罏沽酒遇太陽子過之遂教以補養之術蒸丹之方服而仙去玄女行廚南極通靈神仙傳太玄女者姓頊名和少喪夫乃學道治玉子之術坐置行廚變化無所不至南極子者姓栁名融能含粉成雞子如眞能呪杯成𪚾鼈殼呪水成美酒服雲霜丹仙去也奉林閉氣周君誦經眞誥云婁奉林者學道於嵩山積四百年能閉氣三日不息服黃連以致不死也周君兄弟三人學道於常山中九十七年遇老人授以眞經七卷三人共讀之忽有白鹿見二弟放經看之周君獨不看數滿萬遍翻然沖天二弟爲看鹿經忽火起焚之不得沖天爲心不定也伯眞心正季道天青眞誥云姜伯眞行道采藥遇仙人使平立於日中其影偏仙人曰子心不正因教以日出三丈時披心向日覺心中暖即正也伯眞旦旦行之得道也徐季道學仙遇神仙教云子欲學道當中天青詠天曆躡雙白徊二赤也行之得道劉安接士八仙降庭神仙傳淮南王劉安好道聞有術之士不逺千里卑辭厚禮以迎之時感八仙降焉一人能坐致風雨立起雲霧一人能束縛虎豹召致蛟龍一人能分形易貌坐在立亡一人能乗虚歩空越海淩波一人能入火不灼入水不濡一人能千變萬化恣意所爲一人能防災度厄長生久視一人能煎泥成金凝汞爲銀也丁鶴人語蘇鹿牛形飛天仙人經云丁令威七歳入山求道千年化鶴歸鄉下華表柱頭歌曰我是昔日丁令威學道千年今始歸也蘇君傳蘇躭者彬州人也小時牧牛牛化爲白鹿得道後歸鄕駐牛脾山上州縣官吏同往禮謁日暮君展黃庭經化爲大橋直跨城門官吏登橋而還也大足地黃唐鳯石蜜神仙傳大足服地黃得道唐鳯服中嶽石蜜得道墨容黃連羡門青實神仙傳墨容公服黃連得道羡門子服甘菊青實散得道三老錬氣四皓餌漆神仙傳長陵三老服隂鍊氣乃得成道又云商山四皓服九加散餌漆得道妙眞入洞曁琰飛棺道學傳女眞錢妙眞幼而學道居句曲洞山年八十三誦黃庭經數滿乃與親友告别服黃白色藥了乃入燕洞經宿明晨女冠道士競往候之忽聞洞有雷霆之聲見龍鳯之車自西北而來載以昇天也暨慧琰居於潜天目山學道蟬蜕之後依俗禮葬之數年中忽有聞山蓋山訇無如雷霆之聲郷人往看見棺版飛空上片落南村今爲上片村底版落北村今爲下版村兩邊版同在一處今爲版同村因此昇天也遇藥朱璜盜術女丸列仙傳朱璜廣陽人病毒癡道士阮丘與七物藥日服九丸百病愈教以誦黄庭經隨丘入浮陽山八十年髭髮俱黑仙去女丸者陳市上沽酒婦人也仙人過之寄素書五卷丸乃盜寫其文得養性之道不衰不老棄家而去不知所之常生止雨方回印關列仙傳平常生者數死復生在穀城郷忽大水出所害非一生乃登缺門山大呼言常生在此雨水五日必止如其言後數十年復爲華隂門卒方回者堯時隱人也鍊食雲母夏啓末爲宫士爲盜所劫閉之室中回化身而出更以方回印封其戸時人曰得回一丸泥關可開也仇生木正子先竹竿列仙傳仇生者湯時爲木正食松脂自作石室仙去周武王幸其室而祀之呼子先者卜師也壽百餘歳夜有仙人持竹竿至呼子先乃與酒家嫗各騎一竹乃龍也上華隂山仙去朱仲販珠任光賣丹列仙傳朱仲會稽人常於市上販珠髙后時求三寸珠仲獻之賜五百金魯元公主私以七百金仲獻四寸珠景帝時復獻三寸珠數十枚而去不知所在任光者上蔡人善餌丹賣於都里間趙簡子聘之於柏梯山三世不知所在牧豕商丘鑄冶陶安商丘子胥者髙邑人好牧豕吹竽服术菖蒲飲水不飢不老人世世見之三百年不知所之陶安公者六安鑄冶師也一旦火散上紫色衝天須臾朱雀止冶上曰安公與天通七月七日迎汝以赤龍至期赤龍到大雨安騎之而昇天黃眞武陵劉阮桃源傳云漁人黃道眞武陵人棹漁舟忽入桃源洞遇仙劉晨阮肇剡縣人也採藥於天姥岑迷入桃源洞遇諸仙經半年却歸已見七代孫子初平松脂鳯綱花卉神仙傳皇初平丹谿人也年十五家遣牧羊遇道士將入金華山四十年其兄初起㝷之相遇問羊云在東山往看盡是白石初平叱之悉化爲羊兄弟二人共服松脂茯苓至萬日坐在立亡同昇天初平改姓赤氏號松子初起號赤須子今婺州赤松觀是其地也鳳綱者元陽人也常採百草花水漬泥封埋之百日丸之死者以一丸内口中立活綱服藥不老仙去吕恭遇仙沈建寄婢吕恭字文敬少好服食於太行山採藥忽見三仙人曰子好長生乎吾一人姓吕字文起公與吾同姓合得長生乃隨仙人去經二日遂授袐方一首曰汝隨吾二日已二百年也乃還鄕已見十餘代孫吕習者作道士涕泣拜迎遂傳其方其家世世無有老死者皆得仙去沈建者丹陽人得導引服食之術凡有病者見之即愈嘗遠行寄二婢三奴一驢十羊各與藥一丸經三年並不飮食建旣還乃各與一丸藥喫飲食如故建乃舉身飛行或去或還三百年後不知所在華生易皮樂長童子神仙傳華子期者師甪里先生得靈寳隱方合而服之日行五百里力舉千斤毎一歲十度易皮後乃仙去樂子長者齊人也遇霍林仙人授巨勝赤松散方曰蛇服成龍人服成童子長服之年百八十歳色如少女妻子九人皆服之老者少壯少者不老登勞盛山仙去叔卿不臣伯陽示死神仙傳中山衞叔卿服雲母得仙漢武帝閑居殿上忽見一人乗雲駕白鹿集於殿前帝驚問爲誰答曰我中山衞叔卿也帝曰子非我臣乎叔郷不對忽失所在也帝甚悔恨魏伯陽吳人也入山作神丹將三弟子一白犬丹成飼犬犬死乃自服又死一弟子姓虞服之亦死二弟子棄之而出伯陽乃起將服丹弟子并白犬而去逢樵人乃作書寄郷里并二弟子伯陽作參同契五相類凡二卷盡神丹之旨也方朔歳星傅説箕尾登眞隱訣云東方朔字曼倩仕漢武服初神丸至宣帝時棄官於會稽賣藥後昇為歳星又莊子云傅說得道以相武丁奄有天下乗東維騎箕尾而比於列星沈羲三車安世二士神仙傳吳郡沈義學道於蜀但能消災除病救濟百姓功德感天因與妻共載路逢白鹿車青龍車白虎車騎從皆朱衣執矛仗劔告羲曰君有功於民黃老今遣仙官下迎有三仙人以白玉版青玉界丹玉字授羲遂載昇天陳安世爲灌叔本客毎行見鳥獸皆下道避之未嘗殺物年十三叔本好道忽有二仙人化爲書生詣叔本叔本不悟待之不至乃謂安世曰汝好道可教乃與藥二丸服之不復飲食叔本乃反師之安世臨昇天乃傳其道叔本亦仙而去八百歷代李阿丐市神仙傳李八百蜀人莫知其名時人計其數已八百歳故呼之遊行不定知唐公房可教乃託瘡痍試之百藥不可云須人䑛之房乃令二婢䑛之不可房乃自爲䑛之不可又令妻䑛之云須得美酒三斛浴之浴訖體如凝脂遂令公房并妻三婢並入酒中浴之並顔如童子乃以丹經授公房房合服仙去李阿者蜀人世世見之不老常乞食於市有古强者常随之强時年十八見阿如五十許人至强年八十餘阿亦如故忽告人曰崑崙召吾當去遂不復還也仙苑編珠卷上
