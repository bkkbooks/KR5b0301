front:
  text: 仙苑編珠卷下惟六
  hash: sha256:07f2be96ef85a1a8d58d4f6a0c132e51647ca6c366e86065fd254019e001733a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0301_HFL_003-001a, image: hfl/0330/0330-053.png}
body:
  text: 天台山道士王松年撰竒哉伯山哀矣甥女神仙傳伯山甫者入華山精思服食不老比歸鄉里見外甥女年老多病乃與藥女服之年七十返少色如桃花漢使見一女子笞一老翕翁跪受杖使怪而問之曰此是妾子昔舅氏伯山甫與藥不肯服今年老行不如妾故笞之問年幾云妾年一百四十兒年八十七矣劉綱火焚樊妻雨止劉綱者上虞縣令也與妻樊夫人俱得道術二人俱坐牀上網作大燒屋從東邊起夫人作雨從西邊上火滅聖母踰獄孔元近水東陵聖母者杜氏妻也學劉綱術坐在立亡杜氏不信誣以姦淫告官付獄聖母入獄即從窗中飛出入雲中而去孔元者常服松脂茯苓松實年更少壯已一百七十餘歲人或飲酒請元作酒令元乃以杖柱地倒立頭向下持酒倒飮人不能為之也乃於水邊鑿岸作一穴方丈餘止其間斷榖或一月兩月而出後入西嶽得道也涉正眼光王烈石髓涉正字玄真巴東人説秦皇時事如目前常閉目行亦不開弟子數十年莫見其開目者有一弟子固請開之正乃為開目有聲如霹靂光如電弟干皆匐地李八百呼為四百歲小兒也王烈字長休邯鄲人常服黃精并鍊鉛年二百三十八歲有少容登山如飛少為書生嵇叔夜與之遊烈嘗入太行山聞山裂聲往視之山斷數百丈有青泥出如髓取摶之須臾成石如熱臘之狀食之味如粳米仙經云神山五百歲輒一開其中有髓得服與天地齊畢焦先施薪孫登穴處焦先字孝然河東人常服白石以分人熟如煮芋也日日伐薪以施與人冬常單衣有火焚其菴坐不動火過菴盡衣不焦大雪屋多壞人往看之不見菴乃共抄起菴乃卧在雪下氣如甑中或老或少如此二百年與人别不知所往孫登者止山間穴地而處好彈琴讀易冬夏單衣天大寒但以髮自覆髮長丈餘或市中乞錢隨以與貧人謂嵇叔夜才優於逸倫識少於保身也或彈一弦琴以成音曲亦不知其終也葛由綏山王真女几列仙傳葛由者羌人也周成王時好刻木為羊賣之一旦騎羊入蜀上綏山王侯貴人隨之不復還皆仙去神仙傳上黨王真年七十九學道三十年貌少而色美徐行追奔馬魏武與相見似三十許人以蒸丹法授郤元節鄉里計真已四百餘歲乃將三少妾登女几山去噀酒欒巴施金隂氏神仙傳欒巴蜀人也太守請為功曹以師事之請試術乃平坐入壁中去壁外人呌虎虎還乃巴也遷豫章太守有廟神能與人言語巴到推社稷問其蹤由乃走往齊為書生太守以女妻之生一男巴往齊勑一道符乃化為貍後徵巴為尚書正旦會群臣飲酒巴乃含酒起望西南噀之奏云臣本鄉成都市失火故為雨救之帝馳驛往問之云正旦失火食時有雨自東北來滅火雨皆作酒氣也隂長生者新野人聞馬明生有道乃事之執奴僕之禮十餘年乃將入青天山中示以太清丹藥成服半劑與天相畢乃以半劑煮黃土成黃金數千斤以施天下貧病者在人間一百七十年色如少女著丹經九篇乃白日升天也子訓青騾琴高赤鯉蒯子訓齊人也人莫知其道常以信讓於人二百餘年不老鄉里有書生到京諸朝貴欲一見子訓子訓皆許去京千里同時到門計二十三家家家皆到言語如一諸朝貴欲駐子訓子訓乘青騾而出郊外奔馬追之常相去半里列仙傳琴高者趙人也善鼓琴為宋康王舍人行涓彭之道二百餘年後涿郡水中與弟子期乘赤鯉而仙去壷公賣藥長房掾市神仙傳壷公者不知其姓名也汝南費長房為市掾時見此公來賣藥藥無二價百病皆愈得錢數十萬隨以乞貧凍者常懸一空壷於座前日人之後乃跳入壷中人莫之見唯長房於樓上見之知其非常人也乃朝朝掃灑再拜進食公受之而不謝如此積久長房不怠忽一日謂長房曰待日暮更來長房如其言而往謂長房曰見我跳入壷汝便隨我入長房得入壺但見樓觀五色重門日月明朗侍者甚衆謂長房曰我仙人也卿可教故見我長房隨事三試不過謂曰干不得仙道也今以子為主者耳乃以一竹杖與之遣歸如飛空到家即投於葛陂中自此為人除邪魅救水旱無所不應也董奉活燮劉根見鬼董奉字君異候官縣人時士燮為交州刺史死經三日奉到南中乃以三丸藥內燮口中食頃却活半日能坐云死時如夢中見數十黑衣人收入大珠門付獄入一戶中以土從外封之不見光明也忽聞人語云太一使者召士燮乃聞掘土聲引出登車而覺奉住一年稱疾示死後往廬山種杏數萬株在人間百年乃白日升天劉根字君安京兆人也少學道入嵩山石室中冬凍無衣身生緑毛長一二尺後頴川高太守到宫人民大疫死者太半遣使乞除疫之術根令於太歲泄地上埋朱硃當時疫氣消後張使君到以根為妖遣人召來欲大辱之謂根曰君有道令人見鬼乎根曰能乃請筆硯并奏版一枚書符扣案前鏘然作聲忽聞四五百人傳呼避道擁一科車至廳前乃使君父母也父母責使君不合犯神仙致吾困辱使君叩頭謝罪忽失所在根後居洞庭山毛公壇身生緑毛耳宋倫六甲杜沖九華樓觀傳宋倫字德玄年二十二以周厲王時學道誦五千文服黃精白术積二十年感老君降授靈飛六甲素奏丹符倫行之通感如神言無不驗望巖申步日行三千里淩波涉嶮不由津路年九十餘以景王時升仙下司嵩山杜沖字玄逸年二十五學道祈真靜神守一二十餘載感展真人降授九華丹方告曰老君與尹真人於東海八渟山召太帝集群真有地司舉子之勤故勑我付爾仙方沖服之身生玉光以周穆王時年一百二十歲授書為太極真人道憐貝葉姚坦銀花道學傳女真王道憐七歲知道市香油供養甘蔬素不衣繒綵受三洞經晝夜習誦初入龍山造宫宇號曰玄耀有若神三壇東南忽生一樹狀如籠蓋周廕一壇五葉相對時人莫識呼為貝葉又有玉函降於壇上有光誦經滿萬有雲輿來迎迅雷烈風香氣滿空也樓觀傳姚坦字元泰平陽人年十九以平王元年學道誦五千文有驚風崩山大張口終無怖懼服鍊松脂有神人授玄白回形之道天關三圖飛行之經坦行之目有神光開如飛電年二百一十歲以簡王時五月風雨晦冥雷電激揚天雨銀花繽紛滿地受書為玄洲真人吕尚地髓王柱神砂列仙傳吕尚避紂之亂隱於遼東適周釣於磻溪帝服澤芝地髓年二百告亡葬而無尸唯有玉鈐六篇王柱者與道士共上宕山云此有丹砂可得數萬斤長吏知而封之砂飛出如火乃聽取之與邑令章君明餌砂三年得神砂飛雪服之五年飛行乃俱仙去負局磨鏡服間簷瓜列仙傳負局先生者常負磨鏡局於吳市中磨鏡每一錢與磨之又問主人有疾否輒出紫丸藥與之莫不皆愈數年後得藥活者計萬不取一錢矣人乃知仙人也後上吳山絶崖頭懸藥下與人乃語人曰吾還蓬山為汝下神水一旦崖頭有水自懸下人服多愈也服閭者常止莒往來海邊遇三仙人博瓜令擔黃白瓜數十箇教閉目良久乃在蓬萊山南方丈山上後還莒常往取方丈山珍寶珠玉下賣不知其往也祝雞聚禽玄俗下蛇祝雞公者浴人也居尸鄉比山下養雞百餘年雞皆有名字千餘暮棲晝放每呼即至賣雞并子得錢千萬皆置之而去後升吳山白鶴孔雀數百常止其傍也玄俗者自言河間人也常餌石英賣藥都市七丸一錢治百病河間王病瘕服之下蛇十餘條而愈或云俗無影王乃命於日中果無影王以女妻之中夜而去不知所之陸通樝實文賔菊花陸通者楚狂接輿也好養性食桃樝實遊諸名山蜀峨嵋山上世世見之歷數百年不知其終文賔者太丘鄉人也賣履為業常娶婦十餘年輒棄之後逢故嫗年九十餘告賔賔乃教服菊花地膚子桑寄生枳子嫗乃服之復少壯也紫陽登山清靈遇道紫陽真人周君傳云君字季通周勃七世孫年十六師蘇君受道遊行天下但是名山無不登涉得道受書為紫陽真人位列上清清靈真人裴君傳云君字玄仁年十二遇道人支子元授以真訣五首按而行之五年得見日月之精五星降房受書為清靈真人位列上清道輿得詩楊君獲棗真誥云羊權字道輿降女仙蕚緑華授詩數篇兼遺火浣布手巾金玉條脫云此女是九嶷山中羅郁也宿世有過謪在人間也九百歲矣楊君諱羲為晉簡文相府舍人棄官學道於茅山降紫微夫人九華安妃贈詩兼贈棗一枚至太元十二年乘雲駕龍白日升天受書為侍帝晨東華上佐司命君主司吳越神民也焦曠青禽于章白鳥樓觀傳茅山道士焦曠字大度周武欽仰拜為帝師於華隂造宫巖間湧土用足乃盡以石甕貯油油盡而自滿每有外人來謁常有青鳥二頭來報山靈守護猛獸衛門也于法師名章字長文年七歲時讀道德經年十一師侯法師出家受三洞經法手寫天文祕符一百三十六首逆知吉凶年八十二而蛻臨窆之際有白鳥一隻騰空而翥也靈壽少壯東郭光明神仙傳靈壽光者扶風人也年七十得朱英丸方合服之轉更少壯如年二十時至建安元年已二百二十歲矣東郭延年者山陽人也服靈飛散能夜書在暗室中身生光明照耀左右又能見數十里內小物知其形在鄉里四百餘歲不老一旦有數十人乘虎豹來迎升崑崙也李意萬里王興健行李意期者蜀人也人有逺行欲速到者以符與之并書其人兩腋下則千里萬里不盡日而還王興者陽城人也並不知書亦不知學道漢武帝登嵩高山見一人長二丈許耳垂至肩帝問之曰吾九嶷人也聞中嶽有菖蒲一寸九節可以長生故採之忽失所在帝與群臣皆服之不能勤久唯王興聞而服之不怠至魏武帝時猶在常如五十許人甚健行日三百里不知他道順興真降法樂雲生樓觀傳李先生字順興京兆人年九歲知道師陳先生備受道要既得真訣遂奉經入南山太平谷修行忽有雲車羽蓋翳天而下見三大仙授金真玉光經七變儛天經行之年十七道成年三十八升仙張先生字法樂南陽人丱歲師尹法師真文寶訣咸得付受傳受之夕乃感神燈慶雲之瑞自此精思凡經三十餘載以其雲生梁棟故時人號為雪居觀焉佯死董仲還鄉倩平董仲君者臨淮人也服氣鍊形二百餘歲不老曽被誣繫獄乃佯死須臾蟲出獄吏乃舁出之忽失所在倩平者沛人也漢髙衛卒也得道至光武時不老後託形尸假百餘年却還鄉里也仲都耐熱程妻致繒王仲都者漢中人也漢元帝常以盛暑時暴之繞以十餘爐火而不熱亦無汗凝冬之月令仲都單衣無寒色身上氣蒸如炊後不知所在程偉妻者能通神變化偉當從駕無時衣甚憂妻乃置繒兩匹從空而至偉前偉好作黃白經年不成妻乃出囊中藥少許投之食頃汞乃成銀飛散元綱玄素容成婁元綱服靈飛散得道容成公行玄素之道延壽無極張桑雄黃巢許桂英桑子林張虛並服雄黃巢父許由並服石桂英得道郝容鹿角秀眉茯苓神仙傳郝容公服鹿角秀眉公餌茯苓得仙商丘桃膠青烏九精商丘公服桃膠青鳥公服九精散成仙女生鹿白君達牛青魯女生長樂人服胡麻餌术八十年日行三百里走過麋鹿故人與女生相别五十年於華山廟遇見女生乘白鹿從玉女數十人也封君達者隴西人也服黃精兼服鍊銀百年還鄉如年三十許人常騎青牛人不知姓氏故號為青牛道士也在世二百年乃入玄丘山得道也離婁竹汁白兔黃精離婁公服竹汁白兔公服黃菁而俱得道嚴建聽琴國珍振屋樓觀傳嚴法師名達字道通扶風人也師侯法師年十二日誦萬言年二十備參經法以隋開皇初重修宫宇度道士滿一百二十員至大業五年三月七日坐聽彈琴乃曰音韻入神乃有神降可更奏一曲曲未終奄然而蛻時年九十五也巨法師名國珍武功人年三十捨家入道師遊法師備受道要自爾一味蔬餐幽居帶索飢無貪味寒不思衣口常誦經心恆守一年六十弟子侍側忽聞車馬之聲不見人物屋宇大振奄然而蛻也張皓雲鶴尹澄猿鹿張皓字文明汝南人年二十以漢安永初二年入道乃遇封衡真人三試皆過遂授青腰紫書并神丹半兩入赤城山勤修真道道成或變為白鶴摶空而上或化為飛雲浮遊八外年一百三十八以魏明帝太和元年九月仙官下迎受書為太清高仙矣又尹澄字初默汾隂人年二十八恆市香燈列於壇靜一旦香盡靈熏自生油盡玄光自照曽入山遇鹿傷足乃為合藥與卦後入山遭滯兩絶食忽有群鹿相依飢則吮其乳寒則卧其身纍日得返又入山遇野火飛飊滿谷欲避無路有群猿連臂而下擕至山頂又入山遇石芝有光服方寸已乃日行六七百里又入山遇仙人宋君授三皇文九丹訣年三百四十歲以漢昭帝時仙官下迎受書為太清仙人稷丘進諫武帝還宫列仙傳稷丘君者泰山道士也漢武帝時以道術受賞能令髮白返黑齒落更生還鄉後遇武帝東巡泰山稷君乃冠章甫擁琴出迎武帝諫曰勿上山上必傷足帝不聽果傷足指而還鹿皮閣險鈎翼棺空鹿皮公者少為府小吏木工能舉手成器岑山上有神泉不能至遂白府君請木工斤斧三十人作轉輸懸閣梯道四聞遂止其巔餌芝飲神泉後災水泛漲人得以免鈎翼夫人者齊人姓趙右手常拳不展漢武收之其手乃展得一玉鈎遂生昭帝後武帝害之昭帝更葬棺空唯履在焉谷春却活山圖絶蹤谷春櫟陽人也成帝時為郎託病而亡其尸不寒家人不敢下釘三年却更冠幘坐縣門樓上邑人大驚開棺有衣無尸也駐門上三日而去山圖者隴西人也因乘馬踏折腳遇道士教服地黃當歸羌活獨活苦參散一年而愈乃隨道士採藥云十年一歸家復去莫知所之壷丘變水禦寇馭風列子云壷丘子林者列子之師也鄭有神巫知人吉凶存亡壽夭如神列子引見壷子壷子示以波水三變不能測而走列子者鄭人也名禦冠得風仙之道乘風而行旬有五日而一返受號沖虛真人馮夷河伯文子漁翁馮夷者華隂人也服水玉得水仙之道為河伯也文子者周平王時人老君弟子也著書十二篇泛三江五湖號漁父受號通玄真人莊周鯤化桑楚年豐莊周字子休宋人著書三十三篇其首云北溟鯤魚不知幾千里化而為鵬翼若垂天之雲擊水三千里一舉九萬里至于南溟也受號南華真人也庚桑子名楚老君弟子居羽山三年俗無疪癘而仍穀熟也受號洞靈真人昌容紫草安期赤舄列仙傳昌容者常山道人也往來上下人見者二百餘年而顔色如二十許人能致紫草賣與染家得錢以遺孤老也安期先生者琅琊人也賣藥于東海邊人皆言千歲翁秦始皇東巡見之與語三日三夜賜金璧千萬出皆置之而去注書并赤玉舄一量為報曰後年求我于蓬萊山也馬丹回風修羊化石馬丹者晉耿人也父侯時為大夫獻公滅耿丹入趙至宣子時乘安車入晉靈公欲仕之逼不以禮有迅風發屋丹入回風中去也修羊公者魏人也止華隂石室中卧石塌上石穿陷而不食時餌黃精以道干景帝帝禮之數歲道不可得有詔問何日發語未訖牀上化為白石羊題其脅曰修羊公乃置于通陵臺復失所在赤須知災崔文除疫赤須子者豐人也人世世見之數言豐界內災害水旱十不失一好食松實天門冬石脂齒落更生髮落更出後往吳山下不知所之崔子文者太山人也好道賣藥都市自三百年後有疫氣民死者萬計長吏有所請文乃擁朱幡繫黃散藥以救民飲者即愈所愈萬計後去蜀賣黃藥如初神魚子英巨繭園客子英者舒鄉人善入水捕魚得一赤鯉愛其異乃將歸池中以食餧之年長丈餘生角有翅翼子英遂拜之魚言我來迎汝遂大雨子英上魚背升騰而去園客者濟隂人也常種五色香草積十數年食其實一旦有五色蛾止其草上客以布薦之生桑蠶焉至蠶時有女夜至自稱客妻與客養蠶得一百二十箇繭如甕大每繅一繭六十日始盡訖則俱去莫知所之故濟隂人蠶時世世祠之赤將花紅卯疏乳白赤將子輿者黃帝時人不食五穀而噉百草花至堯時為木工能隨風雨上下卯疏者周封史也能行氣練形煮石髓而服之謂之石鍾乳數百年入少室山中矣親葛鮑靚祐蘇幼伯道學傳鮑靚乃葛洪妻父於羅浮山俱得道列仙傳幼伯子者蘇氏客也冬常單衣夏常綿袴年多益壯時人莫知世世來祐蘇氏子孫得其福力也展公白李薑茂五辛真誥曰高辛時有仙人展上公者於伏龍地植李彌滿林谷今為九宫右保司常言云昔在華陽食白李果美憶之未久忽已三千年已巴陵侯薑叔茂者又於山下種五果并五辛菜叔茂以秦孝王時封侯今名此地為薑巴者因此也此人今在蓬萊為左卿許遜拔宅時荷登晨十二真君傳許君名遜字敬之為蜀旌陽縣令師諶母受孝道明王法與吳君於鍾陵洞斬蛟蜃以晉永康二年八月十五日四十二人拔宅升天時君名荷字道揚四明山道士也許君升天時持龍節前驅于雲路吳猛白鹿甘戰彩麟吳君名猛字世雲晉永嘉三年九月十五日乘白鹿與弟子四人一時升天甘君名戰字伯武許君弟子長持齋戒尤尚符術偏得許君之道以陳天建元年正月七日乘綵麟之車白日升天持幢周廣執羽陳勳周君名廣字惠常事許君執僮僕之禮元康中執麾幢前引許君歸舊宅即遊帷觀也陳君名勳字孝舉慕許君之道託為旌陽縣吏因得師于許君為入室弟子許君拔宅日執羽旌導于前曾亨骨秀盱烈藥神曾君名亨字國興孫登常指云此人骨秀可學升天遂事許君至許君升天日從車駕與升舊宅為真陽觀也盱君名烈字道微早孤從母依於許君許君上升時盱君母子悲泣乞得隨駕許君乃與神藥因得隨駕部署合宅四十二人焉施峯委付彭抗親姻施君名峯字大玉小字道乙常從許君除滅妖魅許君凡有經典悉皆委付許君升天後忽一日見東方日中童子執素書飛下云真人召汝乃隨童子聳身入空彭君名抗永康中棄官事許君君以長女妻之永和二年八月十五日全家二十六人白日上升舊宅為宗華觀黃輔龍騎鍾嘉碧輪黃君名輔字雍晉陵人許君知輔之異遂以次女妻之傳付妙道後為青州從事每夜常乘龍歸眷屬伺之乃一竹杖耳後乃沖天宅為祈仙觀鍾君名嘉字超本許君仲妹之子少孤得仙舅之要許君上升後以十月十五日日中乘碧霞之輦而升宅為丹陵觀十二真君事盡于此婁慶雲舉韋俊龍躍靈驗傳云婁善慶帝賣赤白二藥不言其價有疾皆愈得金帛以施孤貧武德中於西蜀市中足下雲生白日輕舉韋善俊亦賣藥愈疾於人間常將以黑犬相隨以則天如意年中過嵩嶽少林寺請齋飯餧犬僧怒善俊乃含水一噀犬化為黑龍乘以沖天洞玄騰身道合蛻殼女真邊洞玄年八十忽一旦髮白返黑齒落更生以開元二十七年於冀州紫雲宫乘彩雲白日沖天婁道合尸解于并州太一宫腦後有坼身如蟬蛻也法善月宫果老北嶽葉天師名法善字太素引唐玄宗遊月宫賈嵩有賦張果老開元二十二年春自恆州徵到賜號通玄先生授銀青光祿大夫秋請入恆州錫賜衣服雜彩放還北嶽其神通變化不可備陳云九度見黃河清飲酒數斛而不知醉也沖寂焚香道華偷藥謝沖寂者華嶽道士也志好焚香增至三百爐旦夕不闕無香多以松柏子代之以梁開平三年二月清晨有二青童乘紫雲下迎云上帝召謝沖寂乃乘雲而去侯道華者中條山道靜院道士也師事鄧天師天師藥成而疑不敢服道華竊而服之以大中五年五月上升具在唐記可交登舟歸真畫鵲王可交者華亭縣人也眼有神光夜行如晝乃灸眉後小空中而光斷以咸通十年十一月一日與鄰人同出顧會草市河次見一艘舫子有童子喚云王五叔要見乃下船中見二三道士對棊云可惜一具仙骨灸破却也乃與栗子一箇喫一半味如棗云且上岸去更十年後與子相見足才踏岸乃在天台山下瀑布寺前問時日已是十一月二十七日厲歸真者天台縣人也性嗜酒冬夏常衣單衣妙于水墨見屋壁即畫鵲時人不知其得道也以天祐三年十一月于河中府中條山白日沖天告時人曰吾本台州唐興縣人也有弟在彼乃脫下破布衫服星簮羽袂而輕舉雲中寥寥有簫管之聲也馬真升天馮妻降鶴馬真人名自然鹽官人也有篇什在世唯縱酒于鄽市間或眠積雪或卧深水無所不為咸通末于蜀梓州酒樓上白日沖天河中少尹馮徽妻薛氏於道門修行二十餘年以中和三年三月尸解有鶴三十六隻降所居宅院內紫氣滿空玄髮重生也仙苑編珠卷下
