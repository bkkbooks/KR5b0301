front:
  text: 仙苑編珠序惟四
  hash: sha256:50d0ee6b7207e256225145b99f92dc196e9d2eab3c9125cc89fffeca571a1c15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0301_HFL_000-001a, image: hfl/0329/0329-124.png}
body:
  text: 天台山道士王松年撰松年竊詳三古之前百王之後修真學道證果成仙者何代無人抱朴子云秦大夫阮倉所記有數百人劉向撰列仙傳止於七十一人葛洪復撰神仙傳有一百一十七人松年伏按登真隱訣及元始上真記道學傳自開闢以來皆是聖帝明王作神仙宗為造化祖何者如盤古為元始天王天皇氏為扶桑大帝伏羲氏為青帝祝融氏為赤帝軒轅氏為黃帝少昊氏為白帝顓頊氏為黑帝至於髙辛唐虞夏禹周穆漢文並在仙籍松年又尋真誥棲觀傳靈驗傳八真傳十二真君傳近自唐梁已降接於聞見者得一百三十二人伏以誥傳文繁卒難尋究松年輒斆蒙求四字比韻撮其樞要箋注於下目為仙苑編珠謹序
  hash: sha256:d446e938c84039ab3c88a696d9586207b3d0615b703abc21d4224983a070c2d3
