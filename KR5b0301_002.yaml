front:
  text: 仙苑編珠卷中惟五
  hash: sha256:a5104ae2cc3b938e6057a1b3b47a330d2899cf6c0e7cac7b25f86f6ec4080c5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0301_HFL_002-001a, image: hfl/0330/0330-005.png}
body:
  text: 天台山道士王松年撰犢子易貌桂父變容列仙傳犢子者鄴人服松子茯苓百年時壯時老時好時醜忽帝一黃犢來過沽酒陽都家女恱之隨犢子出取桃李味皆甘美邑人伺而逐之共牽黃犢耳而走不能追也數十年見在潘山下冬賣桃李也桂父者象林人色黑時白時黃時赤常服桂并葉以𪚾腦和之千丸至今荆州南有桂丸也一旦飄然入雲而去務光蒲韭阮丘薤葱務光夏時人耳長七寸好琴服蒲韭根湯讓天下不受負石身投蓼水以自溺後四百年至武丁時復見也阮丘者蛆山上道士被髮耳長七寸口中無齒日行四百里常種葱薤百餘年人不知之赤斧餌丹毛女餐松赤斧者巴戎人也為碧雞祠主簿餌丹與消石服之三十年反如童子毛髮生皆赤掌中有赤斧文焉華山中毛女字玉姜自言秦宫人避難入山道士教食松葉遂不飢寒身生緑毛也王喬控鶴陵陽釣龍王喬字子晉好吹笙作鳯嗚道人浮丘公接上嵩山三十年後以七月七日於緱氏山控鶴沖天仙經云仙位為侍帝晨領五嶽司桐柏真人治天台金庭洞陵陽子明者好釣魚釣得白魚腹中有書教服食法遂上黃山採五脂服之三年龍來迎上陵陽山也溪父瓜子騎鳴守宫溪父者南郡人居山間仙人來買瓜教以練瓜子與桂附芷實共藏至春分食之二十餘年能飛行也騎龍鳴者渾亭人年二十於池中求得龍子狀如守宫者千餘頭養飼草廬以守之龍長大稍稍而去後五十年水壤其舍而去一旦騎龍來至渾亭季主長安辛玄吳越道學傳司馬季主賣卜於長安市時宋忠賈誼為中大夫見之謂曰先生業何卑乎對曰夫內無飢寒之纍外無劫奪之憂處上無殺居下無害斯君子之道也鳯凰不與燕雀為羣公等何知後宋忠抵罪賈誼感結也竟不知季主所在登真隱訣云受西靈劔解之法在委羽山大有宫服明丹之華挹扶晨之暉貌如女子鬚長三尺也辛玄子好遊山志願憑子晉以升虛侣陵陽以步玄故名玄子字延期自序云西王母見苦行北鄷帝愍道心於今二百年矣而大帝且令領東海侯為吳越神靈之司未得振翠衣於九霄舞雲翔於十方也許邁山林龍威洞穴真誥云許邁小名阿映道學傳云志往往而不返故自改名逺遊弱冠詣郭璞筮告曰君元吉自天宜學升遐之道乃師鮑靚後與同志東遊名山餌术斷穀能閉氣千息初止桐盧新城臨安所在作樓閣開後門上山采藥經月不返每言映好山林猶魚得水也真誥云師王世龍服玉液朝腦精也龍威丈人者包山得道人也莫知其姓號曰隱居吳王闔閭登包山令隱居極洞穴之源乃入洞經百七十四日而返云約行七千餘里忽見千徑百路處處如一有金城王屋闐爾無人城門牌曰五后别宫玉房之中有一卷赤書拜而取之以為信既出以示吳王乃夏禹所藏靈寶五符也賢安甘草伯玉松屑魏夫人傳夫人字賢安少多疾清虛王真人告曰夫學道先去病除疾五藏充盈肌澤髓滿耳目聰明乃可修習因授甘草丸方按而服之百痾悉愈後得道為南嶽上真司命紫虛元君也禇伯玉錢塘人也年十六家為娶婦婦乘車而入先生踰垣而出隱於天台中峯二十年樵人見之在重巖之下顔色怡怡左右惟有松屑二褁由是逺近知之齊髙帝徴之不起乃移居大霍山仙去神丹馬明方術葛越神仙傳馬明生臨淄人也本姓和字君賢少為賊所傷在路遇神人與藥救之再生乃師安期先生因遊天下勤苦備經遂授與太清金液丹經入山修鍊藥成未樂升天乃服半劑為地仙展轉九州五百餘年乃白日升天葛越者號黃盧子有病者千里寄名與之皆愈禁虎狼百蟲飛鳥皆不得動使水逆上一二里天下大旱能召龍致雨力舉千斤行逐奔馬頭上有五色氣高丈餘年二百八十歲一旦乘龍而去嘯父乘火師門發煙列仙傳嘯父者少北曲周市上補履人不知年幾唯見不老有人求其術不告也唯梁母得其作火法因上三亮山與梁母别乘數十炬火而升天也師門者嘯父弟子也得火術好食桃李花為夏孔甲龍師孔甲殺而埋之一旦風雨迎去而山林間煙火自發也偉道心定黃觀試全真誥云金偉道者學仙在嶓𡺪山十二年仙人試之以石重十萬斤以白髮懸於空中使偉道卧於下偉道心定無疑卧其下十二年遂賜神丹白日冲天黃觀子者少好道朝朝禮拜求長生積四十九年後入唯山中仙人以百四十事試之皆全遂得金丹而誦大洞真經白日升天子主傭顧瑕丘棄捐列仙傳子主者楚語而細音詣江都王言寧先生顧我客作三百年間寧先生所在云在龍眉山上遣使往見先生毛身廣耳被髮鼓琴謂曰子主是吾比舍九世孫也瑕丘仲者寧人也賣藥於寧百餘年忽地動舍壤數十家屋臨水皆敗仲死人取其尸棄於水中收其藥賣之仲乃被裘詣之取藥棄仲尸者叩頭求哀仲曰吾恨汝使人知我耳吾去矣後却為胡王驛使來至寧北方謂之謫仙人也隂生丐乞酒客萬錢隂生者渭橋下乞人也常於市中乞市人厭之以糞灑之衣且不汙長吏試收繫之以桎梏而復在市中乞俄而灑糞家屋自壤故人歌曰見乞兒與美酒以免破屋之咎酒客者梁市上酒家釀酒人也酒美日收萬錢酒客佯作過失酒家逐之而酒酸敗賈人多以女迎之或去或來百餘歲却來為梁丞教民種菜云三年當大飢果如其言忽解印綬而去焉王質柯爛徐公醉眠傳云王質者西安鄉里人也性頗好棊因入山採樵見二仙人於石橋下棊質乃以斧柯磹坐觀棊局終乃起斧柯已爛歸家數百載矣今衢州爛柯山是也徐公者金華鄉里人也入山見數人道士飲酒乃與公一杯飲訖醉卧覺來見其地成一湖水歸家已數代孫子至今金華山中有徐公湖也商仙游火太一浮蓮仙傳云商丘開者晉人也幼好道居姑射山能蹈水火而身不焦溺或救覆舟或噀水而滅大火善丹青然身常貧客隱范氏家諸客見商丘開莫不狎侮欺詒范氏一朝家大火諸客莫能救商丘開獨入火取錦往還埃不漫身不焦火大熾而復對諸客噀水即滅衆方疑其神人慙謝於商丘開後入嵩山不出又太一者漢遺史云武帝元狩中有日者奏太一星不見時帝召東方朔問其由朔奏曰是星不見則遊於世為君民福壽帝又問何以驗焉朔奏曰陛下使人於巽方江海之濵設禮祭而迎之或乘舟或控鶴特異於世人者則為驗見則斫竹建壇醮謝上帝帝如朔奏而迎之是月果有會稽郡守奏海中有一人丫角面如玉色美髭髯裸身而腰蔽槲葉乘一葉紅蓮約長丈餘偃卧其中手執一黃書自東北浮來臣等焚香迎拜俯及百步俄為雲霧所遮後霧散而不知所之遺其黃書飄至岸側獲之略不濡濕其字光明皆天篆也莫有識者遂進於帝帝令朔驗之曰此上界火珠經也或曰連珠李生服玉桂子癩痊李生者名仲甫豐邑中陽人也學道於弘農王君得服玉法行遁甲隱形步斗術年百餘歲每與客對語但聞聲而不見其形後入西嶽不復出又桂子者不知名任徐州刺史病癩十餘年衆醫不愈冥心念道後遇道人于君使休官為于君役者養馬三年心不退君與其丹及書一百五十卷桂服之癩愈年百九十歲色若童子自貸藥於成都復歸西嶽不出方平道蔡子玄師涓神仙傳王遠字方平得道在太尉陳耽家三十餘年一旦託形蟬蛻後東入括蒼過胥門蔡經家知經有仙分遂告以要言而去經亦蟬蛻後十年却還家以七月七日王君後來神仙音樂儀仗羽蓋雲車排空而至王君既坐遣人召麻姑姑既至各進行廚金盤玉杯肴膳多是諸花香氣聞於內外擘脯而行之云是麟脯也麻姑自敘接侍已來見東海三為桑田適來蓬萊水乃淺一半也當復為陸地乎酒盡乃命使者往餘杭阿母求酒使回得一壷五斗許麻姑鳥爪經心中云好爬背聞空中行鞭鞭經背也蘇君傳云君字子玄初師琴髙又師仇先生授以松脂方云吾服已二千七百歲也後師涓子授以制尸蟲方行三一之道守泥丸九宫之要以漢元帝神爵二年三月六日乘雲駕龍望西北而升天為玄洲上卿矣涓子即剖魚獲字者三茅弟兄二許子父登真隱訣云大茅君字叔申年十八入恆山學道師西城王君詣龜山得九轉還丹至漢元帝時仙官下降授玉皇九錫為太元真人東嶽上真卿吳越司命君治天台赤城洞弟字季偉服太極九轉丹為吳越定録君弟字思和所學與中茅同為三官保命君封掌川源監植芝英也晉護軍長史許穆字玄一南嶽元君使楊君授上清諸法得道為左卿仙侯上清真人子名翽字道翔亦楊君授經得道為侍帝晨上清真人茅濛駕龍䔥貞驅虎道學傳茅濛字初成即三茅君之髙祖也師鬼谷先生以秦始皇三十一年於華山乘雲駕龍白日升天也䔥廉貞入遺山學道年四十唯餌柏葉採諸花為丸又取桑葉雜黃精术煎等服年八十白髮黑落齒生常誦黃庭經每有虎伏在牀前欲起先以枤子驅虎如犬前行馮長遇彭彭宗師杜樓觀傳馮長字延壽周宣王辟為柱下史年四十一退官入道誦五千文服天門冬居終南山遇彭真人駕白虎降於道室授以太上隱書以平王時升天為西嶽真人彭宗字法先年二十師於杜君授丹經五千言雌一之道修之有應常有神燈數枝浮空照室能三日三夜通為一息能一氣誦五千言兩遍年一百五十歲厲王時升天為太清真人杜君諱沖字玄逸聞尹真人得道後乃居其宅舍二十五於此修行二十餘載感展真人降於寢室授以仙方合而服之身生玉光周穆王時年一百二十歲升天為太極真人者也王探雲升周亮禽舞王探字飬伯漢文帝稱為逸人時年三十六恆誦五千文每散金帛拯濟飢寒投財要路預是舍生皆沾惠潤感趙真人化作狂人纍歲求乞心無厭怠真人哀之授以神方又於終南遇太玄仙女授以藏景化形之術遂能與日月同光雲霞合變有故人謂曰聞法師善於變化試為一戲乎乃化身為一樹其人乃持斧斫又化為一石復以火燒之又化為波水復以土壅之又化為火復以水沃之又化為一鳥復以網罩之又化為猛虎復以刃擊之又化為死人故人懼而走至數里間復見探如舊乃禮謝之復化為浮雲高升莫測其道也周亮字太冝母孕經十五月而生年十九身長八尺師姚坦得道術王子晉召與鼓琴吹笙同遊伊洛響金振玉百禽率舞年一百九十周烈王時升天東海麻姑餘杭阿姥事具王逺蔡經篇中葛仙靈寶王君上清靈寶經云葛仙公名玄年十八於天台山精思念道感三真人降授靈寶諸經金籙黃籙齊法今修齊所請三師即是此降經三真人也上清經云王君名褒字子登父楷為漢殿三老君年三十一入華山學道感西梁真人降授青精飢飯方後入西城山師總真王君授上清諸法得道為清虛真人天師正一于吉太平正一經云張天師諱道陵學道於蜀鶴鳴山時蜀中人鬼不分災疾競起感太上老君降授正一盟威法以分人鬼置二十四治至今民受其福有戒鬼壇見在神仙傳于吉北海人也患癩瘡數年百藥不愈見市中有賣藥公姓帛名和因往告之乃授以素書二卷謂曰此書不但愈疾當得長生吉受之乃太平經也行之疾愈乃於上虞釣臺鄉高峯之上演此經成一百七十卷至今有太平山干溪在焉九鼎王長七試趙升神仙傳王長張天師入室弟子也天師告諸弟子爾等俗態未除其九鼎之要唯付王長也又有趙升求為弟子天師乃以七事試之皆過遂得入室後與王長俱升太清天中也少君委化伯道丹成神仙傳李少君聞漢武好道故往見之乃密作神丹丹成謂武帝曰陛下不能絶奢侈速聲色殺伐不止喜怒不除萬里有不歸之魂市朝有漂血之刑神丹大藥未可得成乃託疾而化帝恨求少君不勤也真誥云毛伯道婁道恭謝稚堅張兆期共合神丹丹成毛先服而死婁次服又死謝張見之棄丹而出回顧見毛婁二人行在山上謝張悲愕告之得茯苓方服之皆數百歲無復升天也桂君養馬尹軌辟兵神仙傳桂君者徐州刺吏也忽病癩醫不愈聞干吉得道乃導從數百人詣之吉曰子欲病愈乃可盡去將從駐養馬乃可桂君乃去官駐養馬三年並不見醫治不知病之愈也乃授以道術年一百九十仙去尹軌字公度常服黃精花日三合世人纍代見之計已千歲晉永康中過洛陽投宿明旦謂主人曰明年當有大兵死者過半與卿一丸藥帶之可免明年果有趙王之亂死者數萬此人獨免也郭文探虎婁馮盜驚東晉郭文字文舉隱餘杭大辟山嘗有一虎來文前大張其口文知其鯁以手入喉中探去其骨也神仙傳婁馮學於稷丘子服石桂英中嶽石黃年三百歲尤精禁術於路逢諸賈客被劫賊數百圍合馮謂賊曰汝徒急散不爾當殺汝輩賊不聽大放弓箭射諸買客馮乃喝箭皆反中賊身須臾大風拔樹飛砂走石天地陡暗賊衆一時頓地反手背上賊乃求哀乞命馮即勑天兵放之而去孔安有志范蠡易名神仙傳孔安常行氣服鉛丹年三百歲色如童子嘗謂弟子曰吾昔事海濱漁父乃越相范蠡也蠡數易姓名哀我有志授我祕方五篇以得度世也李根眼方子皇齒生神仙傳李根字子元人世世見之不老壽春吳太文師之得作金銀法又能變化入水火致行廚太文常說根兩眼瞳子正方仙經云八百歲也陳子皇者年七十餘髮白齒落乃依方餌术斷榖三年髮盡黑齒更生年二百三十仙去御妾婁景燒炭嚴青婁景者漢文帝侍郎也從張君學道得雲母朱英丸方服之百三十歲如年三十人傳其丸與王公子年七十服之御八十妾生二十兒日行三百里飲一斗酒年二百歲嚴青者會稽人家貧常在山中燒炭忽遇仙人云汝骨相合仙乃以一卷素書與之令以淨器盛之置高處兼教青眼石腦法青遂以淨器盛書置高處便聞左左常有十數人侍之每載炭出此神便為引船他人但見船自行後斷榖入小霍山去常在娶婦仲甫變形李常在者蜀人也少學道人世世見之計已四百歲而不老每娶婦有兒乃去去後三十餘年人見在地肺山更娶婦有兒後七十餘年又忽去人見在虎壽山下依前娶婦有兒也李仲甫豐邑人也師王君服水玉行遁甲能隱形年三百歲轉少壯其隱形或百日或一年與人相對飲食但聞其聲不見其形有相識人相去五百里以張羅為業一旦羅得大鳥視之乃仲甫也在人間三百年入西嶽仙去帛和視壁趙瞿降靈帛和字仲理師董先生行氣斷穀服水又詣西城山師王君君謂曰大道之訣非可卒得吾暫往瀛洲汝於此石室中可熟視石壁久久當見文字見則讀之得道矣和乃視之一年了無所見二年似有文字三年了然見太清中經神丹方三皇文五圖和誦之上口王君回曰子得之矣乃作神丹服半劑延年無極以半劑作黃金五千斤救惠貧病也趙瞿字子榮得癩病將死其家恐相傅染乃以糧食送於深山石室中棄之瞿晝夜涕泣百餘日忽見三人入石室中瞿號泣求救神人乃以松子松脂各五斗賜之告曰服此不但疾愈當得長生瞿乃服之疾愈服至二年夜間滿室有光如晝夜卧見面上美女二人長三寸至三年長大如人常在左右又聞琴瑟之音三百年入霍山仙去甘始門冬黃敬赤星甘始者善行氣不食服天門冬在世一百八十六年入王屋山仙去黃敬字伯巖學道於霍山思赤星在腦中如火以周一身二百餘年仙去陳長祭水宫嵩著經陳長者在苧嶼山六百年每四時設祭亦不飲食亦無所修人有病者與祭水飲之皆愈也宫嵩者大有文才著道書二百餘卷服雲母得地仙道後入苧嶼山中仙去太賔鼓琴傳生鑽石真誥云周太賔有才藝善鼓琴昔教麋長生孫廣田獨弦孑彈而成八音真竒事也得仙今在蓬萊為左卿昔有傳先生少好道入焦山石室中七年遇木極老君與之木鑽使穿一盤石厚五尺許云此石穿便得道生乃晝夜鑽之積四十七年鑽盡石穿得金丹升天為南嶽真人伯微崑崙廣信小白真誥云莊伯微者少好道常以日入時正西北坐閉目存見崑崙山積二十一年服食學道存之不已又十年閉目乃見崑崙仙人授金液方得道也趙廣信魏時居剡小白山每日往長安市賣藥救人暮歸小白時人云朝離小白暮返長安也登真隱訣云受服氣法守玄中之道七十八年後合九華丹一服太一遣雲駕下迎在東華宫餌木玄賔善嘯成伯真誥云張玄賔者師西河蒯公受餌术方後遇真人樊子明授以遁變隱景之道昔在天柱山今來華陽洞為理禁伯主雨水也趙成伯者善嘯嘯如百鳥鳴或如風激衆林或雲翔其上或冥霧飈合或零雨其濛矣今在洞中主五芝金玉草仕文降棗王喬飛舄樓觀傳田法師名仕文年十九入道師韋君受三洞經法挹氣吞霞兼餌白术每遇節值庚申帝捧香登山朝謁嘗設醮天降棗數枚長二寸甘美異帝年七十五有旙花自空來迎去入南宫福堂也漢王喬者仙人也混跡為鄴令夜㑹仙府朝返蒞事人不知之忽一旦㕔吏見雙鳧飛入㕔吏以帚擊之墮地乃喬雙舄也子陽桃皮高丘金液真誥云蕡子陽者學道在傳落山九十餘年但食桃皮飲石中黃水遇司馬季主授以仙方得道高丘子學道入陸景山五百二十年但讀黃素道經服术合鴻丹以得地仙二百年後得金液一服而升太清為中嶽真人也來子紅泉洛下夜芝神仙傳云肯來子服紅泉而仙洛下公服赤鳥夜光芝而仙張常門冬飛盂四時張常服天門冬仙去飛盂子服四時散俱得仙邢子好犬木羽因兒列仙傳云邢子者蜀人也好犬犬走入山穴邢隨犬入十餘宿行數百里上出山頂有臺殿宫府青松森然仙吏侍衛與邢符一函令送與城都令喬君喬發函皆魚子也池中養之一年皆成龍邢復隨犬往來百餘年乃上山不還也木羽者母常為人看産有人産子見母而大笑遂夜夜夢大冠素幘者守此兒云是司命君也當令汝子木羽得仙母果生兒遂名木羽忽一夜有車馬來呼木羽遂俱仙去也馬約神降侯楷奉師樓觀傳馬法師名儉字元約師孫君受五符真文三皇大字能命召萬靈制御群邪凡所施用立皆有驗忽降天神告曰法師宿有功德名在仙録何煩祈禱役使神靈法師乃袐諸法術抱一凝玄年九十八忽有白雲從西北來直赴寢室弟子往看已見白雲南舉漸逺不知所詣侯法師名楷字法先年十四師陳寶熾傳受真訣謂曰爾身佩經法正宜入山勿失時也對曰入山雖得妙之本背師乃犯科之深願終侍奉年五十二方遂所修感靈泉吐液竒樹含煙年八十六仙去母先禽聚陳熾虎隨母法師名始先年十一師牛先生受道朝野英賢咸慕其德所得信施皆訪貧老密放其家不告姓名又冬月常淨地一畒布撒榖米以救禽烏鳥皆群聚於庭陳先生字寶熾年二十一能琴善棊初事王法師後於華隂師陸景真先生以授玄祕每清晨朝禮恆有白虎馴其左右隨逐往來後有群虎來擊樹以警惡人有暴虎來亦擊樹時人號為考虎樹也梁諶入雲孫徹拂衣梁諶字考誠年十七師鄭法師受道視地而行恐傷舍氣有鳥獸當路常下路避之年七十七忽見雲氣彌林乃竦身入雲而去孫徹字仲宣年十八師王先生或宿空樹或坐幽房編葛為席時有問者但觀其顔色即知吉凶不必更陳言語年七十忽告弟子曰吾須暫行乃拂衣而出莫知所之同道思之乃取其葛席置靜室中每聞席邊有人語聲友人聞之又分其席也王義天恤尹通人歸王法師字道義凝神白雲之外注心丹柱之下重興觀宇再啓玄門精誠所致遂多洞感曾降天恤倉庫自滿隨取隨盈終無耗竭常以施人兼營功德遠近貧病皆沾惠潤年六十三忽一旦白鹿入其庭院或隱或見由是而蛻尹通字靈鑒年二十六師馬先生受道服黃精天門冬餌雄黃丸由是賢愚慕其至德車馬駢闐道俗揖其清風冠蓋相望荷恩之輩皆厚禮之通悉用修諸功德廣濟飢寒一無所積年一百一歲仙化常有神燈照室也蓬萊尼公太白歧暉道學傳陳尼公者蓬萊仙人也服磁母石銀蜚通千秋耳有弟子十二人皆得其方而仙度也樓觀傳歧法師名暉字平定唐高祖初取天下法師與道士八十人有濟國之功授金紫光祿大夫已下皆授銀青後為國設醮感黃雲覆壇與香煙交合又有兩隻白鹿鳴呌而去乃謂弟子曰仙經云欲為仙客入太白遂與弟子登太白山頗有雲霞之志焉仙苑編珠卷中
